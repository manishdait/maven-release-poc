on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PR_KEY }}" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "use-agent" >> ~/.gnupg/gpg.conf

      - name: Set Maven version
        run: ./mvnw -B versions:set versions:commit -DnewVersion=${GITHUB_REF_NAME#v}

      - name: Build & Stage (publication profile)
        run: ./mvnw -B -Ppublication deploy

      # Publish using JReleaser
      - name: Publish with JReleaser
        run: ./mvnw -B -Ppublication jreleaser:full-release
        env:
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PR_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUB_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PARSE }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.MAVEN_TOKEN_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.MAVEN_TOKEN_PASSWORD }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Skip Publish
